<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Подгруппа</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(30, 41, 59, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); width: 100%; max-width: 400px; border: 1px solid #334155; }
        h1 { text-align: center; margin-bottom: 8px; color: #f1f5f9; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
        label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #475569; border-radius: 10px; font-size: 1rem; margin-bottom: 14px; background: #1e293b; color: #e2e8f0; }
        input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        input::placeholder { color: #64748b; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .err { color: #fca5a5; font-size: 0.85rem; margin-bottom: 10px; display: none; text-align: center; }
        .links { text-align: center; margin-top: 16px; }
        .links a { color: #818cf8; text-decoration: none; font-size: 0.9rem; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Вход в подгруппу</h1>
        <p class="subtitle">Введите логин и пароль, выданные администратором</p>
        <div class="err" id="err"></div>
        <form id="loginForm">
            <label>Логин</label>
            <input type="text" id="login" required autofocus>
            <label>Пароль</label>
            <input type="password" id="password" required>
            <button type="submit">Войти</button>
        </form>
        <div class="links">
            <a href="/">На главную</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const errEl = document.getElementById('err');
            errEl.style.display = 'none';
            const res = await fetch('/api/student-group-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login: document.getElementById('login').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/student-group-dashboard';
            } else {
                errEl.textContent = data.error || 'Ошибка входа';
                errEl.style.display = 'block';
            }
        };
    </script>
</body>
</html>
